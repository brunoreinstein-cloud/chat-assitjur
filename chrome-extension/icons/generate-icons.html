<!DOCTYPE html>
<html>
<head><title>Generate AssistJur Icons</title></head>
<body>
<h2>AssistJur.IA — Gerador de Ícones</h2>
<p>Abra este arquivo no navegador e clique nos botões para baixar os ícones.</p>

<canvas id="canvas" width="128" height="128" style="border:1px solid #ccc; margin: 10px;"></canvas>
<br/>
<button onclick="download(16)">Download 16x16</button>
<button onclick="download(48)">Download 48x48</button>
<button onclick="download(128)">Download 128x128</button>

<script>
function drawIcon(size) {
  const canvas = document.getElementById('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#130d2e';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.18);
  ctx.fill();

  // Center circle (sun)
  const cx = size / 2;
  const cy = size / 2;
  const r = size * 0.15;

  ctx.fillStyle = '#f0a500';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  // Rays
  ctx.strokeStyle = '#f0a500';
  ctx.lineWidth = Math.max(1, size * 0.06);
  ctx.lineCap = 'round';

  const rayLen = size * 0.12;
  const rayDist = size * 0.25;

  for (let i = 0; i < 8; i++) {
    const angle = (i * Math.PI) / 4;
    const x1 = cx + Math.cos(angle) * (rayDist - rayLen / 2);
    const y1 = cy + Math.sin(angle) * (rayDist - rayLen / 2);
    const x2 = cx + Math.cos(angle) * (rayDist + rayLen / 2);
    const y2 = cy + Math.sin(angle) * (rayDist + rayLen / 2);

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  // "AJ" text
  if (size >= 48) {
    ctx.fillStyle = '#130d2e';
    ctx.font = `bold ${size * 0.18}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('AJ', cx, cy + 1);
  }

  return canvas;
}

function download(size) {
  drawIcon(size);
  const canvas = document.getElementById('canvas');
  const link = document.createElement('a');
  link.download = `icon${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// Draw preview
drawIcon(128);
</script>
</body>
</html>
