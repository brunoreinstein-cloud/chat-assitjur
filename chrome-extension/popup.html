<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AssistJur.IA</title>
  <link rel="stylesheet" href="styles/popup.css" />
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <div class="popup-header">
      <svg class="popup-logo" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
        <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
        <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
      </svg>
      <span class="popup-brand">
        <span class="brand-assist">Assist</span><span class="brand-jur">Jur.</span><span class="brand-ia">IA</span>
      </span>
    </div>

    <!-- Status -->
    <div id="popup-status" class="popup-status">
      <span id="popup-status-dot" class="status-dot status-checking"></span>
      <span id="popup-status-text">Verificando conexão...</span>
    </div>

    <!-- Page info -->
    <div id="popup-page-info" class="popup-page-info" style="display:none">
      <div class="page-info-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
      </div>
      <div>
        <div id="popup-system-name" class="page-info-system"></div>
        <div id="popup-process-number" class="page-info-number"></div>
      </div>
    </div>

    <!-- Actions -->
    <div class="popup-actions">
      <button id="btn-open-panel" class="popup-btn popup-btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
        Abrir Copiloto
      </button>

      <button id="btn-analyze" class="popup-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Analisar Página
      </button>

      <button id="btn-webapp" class="popup-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Abrir App Completo
      </button>
    </div>

    <!-- Setup hint -->
    <div id="popup-setup-hint" class="popup-setup-hint" style="display:none">
      <p>Configure a URL da API para começar.</p>
      <button id="btn-setup" class="popup-btn popup-btn-primary">Configurar</button>
    </div>
  </div>

  <script src="scripts/popup.js"></script>
</body>
</html>
